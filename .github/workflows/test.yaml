name: Test

run-name: Run tests for all platforms

on:
  push:
  workflow_dispatch:
  
jobs:
  build:
    strategy:
      matrix:
        include:
          # - os: windows-latest
          #   target: x86_64-windows-msvc
          # - os: windows-11-arm
          #   target: aarch64-windows-gnu
          # - os: ubuntu-latest
          #   target: x86_64-linux-musl
          # - os: ubuntu-24.04-arm
          #   target: aarch64-linux-musl
          - os: macos-latest
            target: aarch64-macos
          # - os: macos-15-intel
          #   target: x86_64-macos
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ github.token }}

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Install deps (Ubuntu)
        if: contains(matrix.os, 'ubuntu')
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 22
          sudo apt-get install -y libhunspell-dev llvm-22-dev

      - name: Install deps (MacOS)
        if: contains(matrix.os, 'macos')
        run: |
          brew install hunspell

      - name: Build C libs
        run: zig build --prefix libs -Dtarget=${{ matrix.target }}

      - name: Download BeefBuild
        uses: robinraju/release-downloader@v1
        with:
          repository: 'farism/Beef'
          tag: 'nightly-07-17-2026'
          fileName: '${{ matrix.os }}.zip'
          extract: true
          extract-path: 'BeefBuild'

      - name: BeefBuild -test
        run: |
          chmod +x ./BeefBuild/BeefBuild_d
          ./BeefBuild/BeefBuild_d -run
