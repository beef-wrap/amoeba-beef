name: Build All
run-name: Run tests for all platforms
on: [push]
jobs:
  build:
    strategy:
      matrix:
        # os: [windows-latest, windows-11-arm, ubuntu-latest, ubuntu-24.04-arm, macos-latest, macos-15-intel]
        os: [ubuntu-latest]
        include:
          - os: windows-latest
            target: x86_64-windows-msvc
          - os: windows-11-arm
            target: aarch64-windows-gnu
          - os: ubuntu-latest
            target: x86_64-linux-musl
          - os: ubuntu-24.04-arm
            target: aarch64-linux-musl
          - os: macos-latest
            target: aarch64-macos
          - os: macos-15-intel
            target: x86_64-macos
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ github.token }}
      - uses: robinraju/release-downloader@v1
        with:
          repository: 'farism/Beef'
          tag: 'nightly-07-17-2026'
          fileName: '${{ matrix.os }}.zip'
          extract: true
          extract-path: 'BeefBuild'
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - run: |
          sudo apt-get install -y libhunspell-dev libllvm22
          zig build --prefix libs -Dtarget=${{ matrix.target }}
          chmod +x ./BeefBuild/BeefBuild_d
          ./BeefBuild/BeefBuild_d -run
