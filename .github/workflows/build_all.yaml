name: Build All
run-name: Run tests for all platforms
on: [push]
jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest]
        include:
          - os: windows-latest
            target: x86_64-windows-msvc
        # os: [windows-latest, ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ github.token }}
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - run: |
          zig build --prefix libs -Dtarget=${{ matrix.target }}
          cd libs
          ls -la